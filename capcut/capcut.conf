[MITM]
hostname = %APPEND% api*.byteoversea.com, api*.tiktokv.com, api.capcut.com, lf*.bytescm.com, *.capcut.com

[Rule]
DOMAIN-SUFFIX,ads.capcut.com,REJECT
DOMAIN-SUFFIX,analytics.capcut.com,REJECT
DOMAIN-SUFFIX,metrics.capcut.com,REJECT

[URL Rewrite]
^https:\/\/api\.capcut\.com\/pay\/v\d\/ads _ reject-200
^https:\/\/api\.capcut\.com\/service\/\d\.\d\/ad\/.* _ reject-200
^https:\/\/lf\d+-\w+-\w+\.bytescm\.com\/obj\/capcut-ad\/.* _ reject-200

[Script]
# Delete auth headers
capcut-delete-header = type=http-request, pattern=^https:\/\/api\.capcut\.com\/(pay|vip|subscription)\/v\d\/, script-path=https://raw.githubusercontent.com/BOBOLAOSHIV587/zTest/main/capcut/JS/deleteHeader.js, timeout=60, script-update-interval=0

# Main Pro unlock script
capcut-pro = type=http-response, pattern=^https:\/\/api\.capcut\.com\/pay\/v\d\/user_info, requires-body=true, max-size=-1, script-path=https://raw.githubusercontent.com/BOBOLAOSHIV587/zTest/main/capcut/JS/capcut-pro.js, script-update-interval=0

# Subscription status script
capcut-subscription = type=http-response, pattern=^https:\/\/api\.capcut\.com\/(subscription|vip)\/v\d\/status, requires-body=true, max-size=-1, script-path=https://raw.githubusercontent.com/BOBOLAOSHIV587/zTest/main/capcut/JS/capcut-subscription.js, script-update-interval=0

# Premium resources unlock
capcut-resource = type=http-response, pattern=^https:\/\/api\.capcut\.com\/resource\/v\d\/(font|sticker|template|effect), requires-body=true, max-size=-1, script-path=https://raw.githubusercontent.com/BOBOLAOSHIV587/zTest/main/capcut/JS/capcut-resource.js, script-update-interval=0

# Export quality unlock
capcut-export = type=http-response, pattern=^https:\/\/api\.capcut\.com\/export\/v\d\/\w+, requires-body=true, max-size=-1, script-path=https://raw.githubusercontent.com/BOBOLAOSHIV587/zTest/main/capcut/JS/capcut-export.js, script-update-interval=0

